<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>MB-820 Quiz</title>
</head>
<body>
    <div id="quiz-container">
        <div id="quiz-header">
            <h1>MB-820 Quiz</h1>
            <button id="home-btn" style="display:none;">&#127968; Main Page</button>
        </div>
        <div id="set-selection" style="display: none;"></div>
        <div id="timer-display" style="display: none;"></div>
        <div id="question"></div>
        <div id="choices"></div>
        <button id="next-button" style="display: none;">Next</button>
        <div id="score-summary" style="display: none;"></div>
    </div>
    <div id="math-overlay">
        <div id="math-card">
            <h2>&#129302; Human Verification</h2>
            <p id="math-challenge-text">Solve the challenge to access the quiz.</p>
            <p id="math-question-display"></p>
            <input type="number" id="math-input" placeholder="Your answer" autocomplete="off" />
            <p id="math-error" style="display:none;">Incorrect answer. Please try again.</p>
            <button id="math-submit-btn">Enter</button>
        </div>
    </div>
    <div id="confirm-overlay" style="display:none;">
        <div id="confirm-card">
            <h2 id="confirm-title"></h2>
            <p id="confirm-message"></p>
            <div class="resume-buttons">
                <button id="confirm-yes-btn" class="resume-btn">Yes</button>
                <button id="confirm-no-btn" class="new-quiz-btn">Cancel</button>
            </div>
        </div>
    </div>
    <div id="pause-overlay" style="display:none;">
        <div id="pause-card">
            <div class="pause-icon">&#9646;&#9646;</div>
            <h2>Quiz Paused</h2>
            <p>You've been inactive for 2 minutes.<br>Your progress has been saved.</p>
            <div class="resume-buttons">
                <button id="pause-resume-btn" class="resume-btn">&#9654; Continue Quiz</button>
                <button id="pause-home-btn" class="new-quiz-btn">&#127968; Main Page</button>
            </div>
        </div>
    </div>
    <script src="questions.js"></script>
    <script src="questions2.js"></script>
    <script src="questionsOfficial.js"></script>
    <script src="testcases.js"></script>
    <script src="app.js"></script>
</body>
</html>
